    <!-- CONNECTING PREMIUM LUXURY FONTS -->
    <link rel="preconnect" href="https://googleapis.com">

    <style>
        :root {
            --bg-main: #020101;
            --bg-sidebar: rgba(10, 6, 4, 0.5);
            --bg-chat-card: rgba(18, 11, 7, 0.35);
            --border-neon: rgba(255, 85, 0, 0.15);
            --border-neon-active: rgba(255, 115, 0, 0.45);
            --accent-orange: #ff4500;
            --accent-neon: #ff9900;
            --text-main: #fcf9f7;
            --text-muted: #7a6960;
            --sidebar-width: 270px;
        }

        /* 100% BULLETPROOF LIQUID FIRE SEA (AUTONOMOUS CSS GRAPHICS) */
        .sea-background {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background: linear-gradient(135deg, #030201 0%, #160702 30%, #3a1502 65%, #4f1d02 85%, #030201 100%);
            background-size: 400% 400%;
            animation: liquidPlasma 12s ease-in-out infinite;
        }

        @keyframes liquidPlasma {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* КІНЕМАТОГРАФІЧНІ НЕОНОВІ ХВИЛІ ПРИПЛИВУ */
        .sea-wave-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background: radial-gradient(circle at 50% 60%, rgba(255, 69, 0, 0.08) 0%, transparent 60%),
                        radial-gradient(circle at 20% 30%, rgba(255, 153, 0, 0.04) 0%, transparent 50%);
            animation: breathingWater 8s ease-in-out infinite alternate;
        }

        @keyframes breathingWater {
            0% { opacity: 0.4; transform: scale(1) translateY(-10px); }
            100% { opacity: 0.9; transform: scale(1.05) translateY(10px); }
        }

        body { background-color: transparent; color: var(--text-main); font-family: 'Space Grotesk', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* PREMIUM FROST GLASS SIDEBAR */
        .sidebar { 
            width: var(--sidebar-width); 
            background-color: var(--bg-sidebar); 
            border-right: 1px solid var(--border-neon); 
            display: flex; 
            flex-direction: column; 
            padding: 35px 24px; 
            box-sizing: border-box; 
            backdrop-filter: blur(40px); 
            -webkit-backdrop-filter: blur(40px); 
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        .logo { 
            font-family: 'Dela Gothic One', cursive; 
            font-size: 1.2rem; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            color: #ffffff; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            text-shadow: 0 0 20px rgba(255, 69, 0, 0.65); 
        }
        .logo svg { width: 24px; height: 24px; fill: #ff4500; filter: drop-shadow(0 0 5px var(--accent-orange)); }

        .btn-reset {
            background: transparent; border: none; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; transition: all 0.3s ease;
        }
        .btn-reset:hover { color: var(--accent-orange); transform: rotate(-90deg); }
        .btn-reset svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; }

        .btn-new-chat { 
            background: rgba(255, 69, 0, 0.02);
            color: #ffffff; 
            border: 1px solid var(--border-neon);
            padding: 14px 20px; 
            border-radius: 28px; 
            font-weight: 500; 
            font-size: 0.88rem;
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); 
            display: flex;
            align-items: center;
            justify-content: space-between;
            letter-spacing: 0.5px;
        }
        .btn-new-chat:hover { 
            background: rgba(255, 69, 0, 0.06);
            border-color: var(--border-neon-active);
            box-shadow: 0 0 25px rgba(255, 69, 0, 0.15);
            transform: translateY(-1px);
        }
        .btn-new-chat svg { width: 14px; height: 14px; fill: none; stroke: var(--accent-neon); stroke-width: 2.5; }
        
        .chat-list { flex: 1; margin-top: 35px; overflow-y: auto; }
        .chat-list::-webkit-scrollbar { width: 0px; }
        
        .chat-item { 
            padding: 14px 18px; 
            border-radius: 16px; 
            margin-bottom: 8px; 
            cursor: pointer; 
            font-size: 0.86rem; 
            color: var(--text-muted); 
            transition: all 0.3s ease;
            position: relative;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid transparent;
        }
        .chat-item:hover { color: #ffffff; background: rgba(255, 255, 255, 0.03); }

            border-color: rgba(255, 69, 0, 0.15);

            font-weight: 500;
        }
        .chat-item.active::before {
            content: ''; position: absolute; left: 0; top: 30%; width: 3px; height: 40%;
            background: var(--accent-orange); border-radius: 4px; box-shadow: 0 0 10px var(--accent-orange);

        .chat-area { flex: 1; display: flex; flex-direction: column; background-color: transparent; position: relative; }
        .chat-history { flex: 1; padding: 130px 24px 20px 24px; max-width: 900px; width: 100%; margin: 0 auto; box-sizing: border-box; overflow-y: auto; display: flex; flex-direction: column; gap: 32px; }
        .chat-history::-webkit-scrollbar { width: 0px; }
        
        .center-welcome { text-align: center; margin-top: 12vh; }

        .star-symbol { 
            width: 65px; height: 65px; margin: 0 auto 24px auto; display: block; 
            filter: drop-shadow(0 0 15px rgba(255, 69, 0, 0.5)); 
            animation: infiniteRotate 25s linear infinite; 
        }
        @keyframes infiniteRotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .center-welcome h2 { 
            font-family: 'Orbitron', sans-serif; font-size: 2.8rem; font-weight: 600; margin-bottom: 45px; color: #ffffff; letter-spacing: -0.5px;
            background: linear-gradient(180deg, #ffffff 50%, rgba(255,255,255,0.3));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .message { 
            max-width: 85%; 
            line-height: 1.7; 
            font-size: 1rem; 
            font-family: 'Inter', sans-serif; 
            padding: 6px 0; 
            animation: messageFadeIn 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            opacity: 0;
            transform: translateY(10px);
        }
        @keyframes messageFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user { color: #ffffff; border-left: 2px solid var(--accent-orange); padding-left: 24px; font-weight: 500; align-self: flex-start; }
        .message.ai { color: #e5d7d0; padding-left: 26px; white-space: pre-wrap; align-self: flex-start; }
        
        .code-container { position: relative; margin-top: 16px; border-radius: 16px; overflow: hidden; border: 1px solid var(--border-neon); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .code-block { background-color: rgba(6, 4, 3, 0.95); padding: 24px; font-family: 'Share Tech Mono', monospace; overflow-x: auto; white-space: pre-wrap; color: #ffca85; font-size: 0.96rem; letter-spacing: 0.5px; }
        .btn-copy { position: absolute; top: 12px; right: 12px; background: rgba(15,10,7,0.6); border: 1px solid var(--border-neon); color: var(--text-muted); padding: 6px 14px; font-size: 0.75rem; border-radius: 8px; cursor: pointer; backdrop-filter: blur(5px); transition: 0.2s; }
        .btn-copy:hover { color: #ffffff; border-color: rgba(255,115,0,0.4); }

        .input-container { padding: 20px 24px 45px 24px; max-width: 900px; width: 100%; margin: 0 auto; box-sizing: border-box; background: linear-gradient(to top, #020101 60%, transparent); position: relative; }
        
        /* LUXURY INPUT BOX HUB */
        .input-area { 
            background-color: rgba(15, 10, 7, 0.75); 
            border: 1px solid var(--border-neon); 
            padding: 14px 28px; 
            border-radius: 32px; 
            display: flex; 
            gap: 18px; 
            align-items: center; 
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .input-area:focus-within {
            border-color: var(--border-neon-active);
            box-shadow: 0 15px 50px rgba(255, 69, 0, 0.15), 0 0 30px rgba(255, 69, 0, 0.05);
        }
        .input-box { flex: 1; background: transparent; border: none; color: #ffffff; padding: 6px 0; outline: none; font-size: 1.02rem; font-family: 'Inter', sans-serif; }
        .input-box::placeholder { color: #524741; }
        
        .btn-action { background: transparent; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; padding: 4px; }
